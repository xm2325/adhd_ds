name: apply-v08-transparent-patches

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/resilience-lab-v08'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/resilience-lab-v08
          fetch-depth: 0
          show-progress: false
      - name: Validate orchestrator patch
        run: |
          set -euxo pipefail
          echo "cf1143a214870cf3fb725ae3dc249b9f5c8cde55895ec74d9e57bb08c4c58aaf  .v08_patch/orchestrator.patch" | sha256sum -c -
          git apply --check .v08_patch/orchestrator.patch
      - name: Apply and commit orchestrator integration
        run: |
          set -euxo pipefail
          git apply .v08_patch/orchestrator.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/adhd_ops/orchestrator.py
          git diff --cached --quiet && { echo "no source changes"; exit 1; }
          git commit -m "Complete v0.8 resilience integration"
          git pull --rebase origin agent/resilience-lab-v08
          git push origin HEAD:agent/resilience-lab-v08
