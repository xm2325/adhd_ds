name: test-and-build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Check dashboard JavaScript syntax
        run: |
          for file in src/adhd_ops/assets/dashboard_*.js; do node --check "$file"; done
      - name: Run automated tests
        run: pytest -q
      - name: Build synthetic analytics products
        run: python -m adhd_ops.orchestrator --root .
      - name: Check dashboard, contracts, API and audit outputs
        run: |
          test -s reports/operations_dashboard.html
          test -s docs/index.html
          test -s results/run_manifest.json
          test -s results/data_contract_status.csv
          test -s results/source_profiles.csv
          test -s results/queue_policy_comparison.csv
          test -s results/incident_register.csv
          test -s results/data_lineage.csv
          test -s results/service_level_status.csv
          test -s results/resource_optimisation.csv
          grep -q "Audit, data contracts and service API" reports/operations_dashboard.html
          grep -q "Controlled API surface" reports/operations_dashboard.html
          grep -q "renderAudit" reports/operations_dashboard.html
          python - <<'PY'
          from fastapi.testclient import TestClient
          from adhd_ops.service import create_app
          client = TestClient(create_app('.'))
          assert client.get('/health').status_code == 200
          assert client.get('/v1/appointment-support').status_code == 403
          assert client.get('/v1/appointment-support?limit=1', headers={'X-Role':'operations'}).status_code == 200
          PY
      - name: Publish workflow summary
        run: |
          echo "## ADHD DS v0.5 build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python tests and JavaScript checks passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Eight-workspace interactive dashboard generated" >> "$GITHUB_STEP_SUMMARY"
          echo "- Data contracts, source fingerprints, run manifest, queue policies, incidents and API checks generated" >> "$GITHUB_STEP_SUMMARY"
          echo "- All data, costs, effects, identifiers and results are synthetic" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload compact review pack
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: adhd-ds-v05-review-pack
          retention-days: 7
          compression-level: 9
          path: |
            docs/index.html
            reports/weekly_operational_brief.md
            reports/monthly_control_pack.md
            reports/data_quality_report.html
            results/run_summary.json
            results/run_manifest.json
            results/data_contract_status.csv
            results/source_profiles.csv
            results/queue_policy_comparison.csv
            results/incident_register.csv
            results/service_level_status.csv
