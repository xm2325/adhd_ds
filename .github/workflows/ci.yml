name: test-and-build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run automated tests
        run: pytest
      - name: Build synthetic analytics products
        run: python -m adhd_ops.pipeline --root .
      - name: Check dashboard outputs
        run: |
          test -s reports/operations_dashboard.html
          test -s docs/index.html
          test -s results/operational_action_queue.csv
          grep -q "Interactive scenario planner" reports/operations_dashboard.html
          grep -q "Synthetic service simulation" reports/operations_dashboard.html
          grep -q "exportSupport" reports/operations_dashboard.html
      - name: Publish workflow summary
        run: |
          echo "## ADHD DS build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Automated tests passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Interactive dashboard generated and checked" >> "$GITHUB_STEP_SUMMARY"
          echo "- Data-quality, pathway, forecast, capacity and model outputs generated" >> "$GITHUB_STEP_SUMMARY"
          echo "- All data and results are synthetic" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload compact review pack
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: adhd-ds-review-pack
          retention-days: 7
          compression-level: 9
          path: |
            docs/index.html
            reports/weekly_operational_brief.md
            reports/data_quality_report.html
            results/run_summary.json
            results/operational_action_queue.csv
            results/capacity_scenarios.csv
            results/attendance_model_metrics.csv
